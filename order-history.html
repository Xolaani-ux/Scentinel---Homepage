<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order History — Scentinel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  ::selection { background: #000; color: #fff; }
  :root {
    --black:#000; --white:#fff; --gray-border:#cdcdcd;
    --gray-muted:#888; --off-white:#f9f8f6;
    --font-sans:'Segoe UI',system-ui,sans-serif;
    --font-serif:'Lora',serif;
    --ease:cubic-bezier(.22, 1, .36, 1);
    --px:48px; --max-w:1212px;
  }
  html { scroll-behavior: smooth; }
  body { font-family: var(--font-sans); background: var(--white); color: var(--black); overflow-x: hidden; min-height: 100vh; display: flex; flex-direction: column; }

  .announce { background: var(--black); height: 29px; display: flex; align-items: center; justify-content: center; position: fixed; top: 0; left: 0; right: 0; z-index: 201; transition: transform .35s var(--ease), opacity .3s; }
  .announce.hidden { transform: translateY(-100%); opacity: 0; pointer-events: none; }
  .announce span { font-weight: 300; font-size: 13px; letter-spacing: .06em; color: var(--white); }

  @keyframes navbarReveal { from { opacity:0; transform:translateY(-28px); } to { opacity:1; transform:translateY(0); } }
  @keyframes navChildReveal { from { opacity:0; transform:translateY(-10px); } to { opacity:1; transform:translateY(0); } }

  .navbar { position: fixed; top: 29px; left: 0; right: 0; z-index: 200; display: flex; align-items: center; justify-content: space-between; padding: 18px var(--px); background: rgba(255,255,255,.97); backdrop-filter: blur(8px); border-bottom: 1px solid rgba(0,0,0,.06); transition: padding .35s, top .35s, box-shadow .35s; animation: navbarReveal .75s var(--ease) both; }
  .navbar.scrolled { padding: 12px var(--px); top: 0; box-shadow: 0 2px 24px rgba(0,0,0,.07); }

  .navbar__left { opacity:0; animation: navChildReveal .55s var(--ease) .35s forwards; display: flex; align-items: center; gap: 16px; }
  .navbar__logo { opacity:0; animation: navChildReveal .55s var(--ease) .5s forwards; position: absolute; left: 50%; transform: translateX(-50%); }
  .navbar__logo-text { font-family: var(--font-serif); font-style: italic; font-size: 22px; color: var(--black); text-decoration: none; }
  .navbar__right { opacity:0; animation: navChildReveal .55s var(--ease) .65s forwards; display: flex; align-items: center; gap: 16px; }

  .back-link { font-family: var(--font-sans); font-weight: 300; font-size: 11px; letter-spacing: .1em; text-transform: uppercase; color: var(--gray-muted); text-decoration: none; display: flex; align-items: center; gap: 6px; transition: color .2s; }
  .back-link:hover { color: var(--black); }
  .back-link svg { width: 14px; height: 14px; fill: none; stroke: currentColor; stroke-width: 1.5; }
  .nav-icon { display: flex; align-items: center; justify-content: center; width: 28px; height: 28px; color: var(--black); text-decoration: none; background: none; border: none; cursor: pointer; position: relative; transition: opacity .2s, transform .15s; }
  .nav-icon:hover { opacity: .5; transform: scale(1.08); }
  .nav-icon svg { width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 1; stroke-linecap: round; stroke-linejoin: round; }
  .cart-wrap { position: relative; }
  .cart-badge { position: absolute; top: -5px; right: -7px; background: var(--black); color: var(--white); font-weight: 600; font-size: 9px; min-width: 15px; height: 15px; border-radius: 8px; display: flex; align-items: center; justify-content: center; padding: 0 3px; pointer-events: none; }
  .cart-badge:empty { display: none; }

  @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
  .c-page { max-width: calc(var(--max-w) + var(--px) * 2); width: 100%; margin: 0 auto; padding: 97px var(--px) 120px; animation: fadeUp .6s var(--ease) .05s both; flex: 1; }

  .s-title { font-weight: 500; font-size: clamp(20px, 2.2vw, 29px); letter-spacing: .01em; text-transform: uppercase; line-height: 1.1; color: var(--black); padding: 48px 0 28px; }

  .order-list { display: flex; flex-direction: column; }
  .order-row { display: flex; align-items: center; gap: 28px; padding: 24px 0; border-bottom: 1px solid var(--gray-border); transition: background .2s; }
  .order-row:first-child { border-top: 1px solid var(--gray-border); }
  .order-row__img { flex-shrink: 0; width: 72px; height: 96px; background: var(--off-white); display: flex; align-items: center; justify-content: center; font-family: serif; font-style: italic; font-size: 16px; color: #bbb; }
  .order-row__info { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 3px; padding-top: 2px; }
  .order-row__brand { font-weight: 300; font-size: 19px; letter-spacing: .01em; text-transform: uppercase; line-height: 1.1; }
  .order-row__name  { font-weight: 200; font-size: 15.5px; line-height: 1.1; }
  .order-row__meta  { font-weight: 300; font-size: 11.5px; letter-spacing: .04em; text-transform: uppercase; opacity: .55; margin-top: 2px; }
  .order-row__right { flex-shrink: 0; display: flex; flex-direction: column; align-items: flex-end; gap: 8px; padding-top: 2px; min-width: 140px; }

  .status-badge { display: inline-flex; align-items: center; justify-content: center; height: 21px; padding: 0 12px; font-weight: 400; font-size: 11px; letter-spacing: .17em; text-transform: uppercase; white-space: nowrap; }
  .status-badge--pending   { background: var(--black); color: var(--white); }
  .status-badge--completed { background: #166534; color: var(--white); }
  .status-badge--cancelled { background: #888; color: var(--white); }

  .order-row__price  { font-weight: 200; font-size: 16px; line-height: 1.37; white-space: nowrap; }
  .order-row__date   { font-weight: 300; font-size: 10.5px; letter-spacing: .06em; color: var(--gray-muted); text-transform: uppercase; }
  .order-row__number { font-weight: 300; font-size: 9.5px; letter-spacing: .06em; color: rgba(0,0,0,.35); text-transform: uppercase; margin-top: 2px; }

  .order-row__more { margin-top: 6px; font-weight: 300; font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: var(--gray-muted); cursor: pointer; background: none; border: none; padding: 0; transition: color .2s; }
  .order-row__more:hover { color: var(--black); }
  .order-row__sub { display: none; flex-direction: column; gap: 12px; padding-top: 12px; margin-top: 4px; border-top: 1px solid rgba(0,0,0,.06); grid-column: 1 / -1; width: 100%; }
  .order-row__sub.open { display: flex; }
  .sub-item { display: flex; align-items: center; gap: 12px; font-size: 13px; font-weight: 300; color: rgba(0,0,0,.7); }
  .sub-item__img   { width: 36px; height: 48px; background: var(--off-white); display: flex; align-items: center; justify-content: center; font-style: italic; font-size: 11px; color: #bbb; flex-shrink: 0; }
  .sub-item__name  { flex: 1; }
  .sub-item__qty   { color: var(--gray-muted); font-size: 11px; }
  .sub-item__price { font-weight: 200; white-space: nowrap; }

  .empty-state { padding: 72px 0; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 16px; }
  .empty-state__icon { width: 48px; height: 48px; opacity: .18; }
  .empty-state__title { font-weight: 500; font-size: 18px; letter-spacing: .04em; text-transform: uppercase; color: var(--black); }
  .empty-state__sub   { font-weight: 300; font-size: 13px; color: var(--gray-muted); }
  .empty-state__cta   { display: inline-block; margin-top: 8px; background: var(--black); color: var(--white); font-weight: 400; font-size: 11px; letter-spacing: .22em; text-transform: uppercase; text-decoration: none; padding: 14px 32px; transition: background .2s; }
  .empty-state__cta:hover { background: #1a1a1a; color: var(--white); }

  .c-footer { background: var(--black); padding: 24px var(--px); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
  .c-footer__auth { font-weight: 300; font-size: 11px; letter-spacing: .18em; text-transform: uppercase; color: rgba(255,255,255,.25); border: 1px solid rgba(255,255,255,.1); padding: 6px 14px; }
  .c-footer__copy { font-weight: 300; font-size: 12px; color: rgba(255,255,255,.25); letter-spacing: .04em; }

  @media(max-width:720px) { :root{--px:24px;} .order-row__brand{font-size:15px;} .order-row__name{font-size:13px;} .order-row__right{min-width:100px;} }
  @media(max-width:540px) { .order-row{flex-wrap:wrap;} .order-row__right{flex-direction:row;align-items:center;width:100%;justify-content:space-between;padding-top:0;min-width:auto;} }
  </style>
</head>
<body>

<div class="announce" id="announce">
  <span>100% Authentic &nbsp;&nbsp;·&nbsp;&nbsp; Free Shipping &nbsp;&nbsp;·&nbsp;&nbsp; Easy Returns</span>
</div>

<nav class="navbar" id="mainNav">
  <div class="navbar__left">
    <a href="index.html" class="back-link">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      Home
    </a>
  </div>
  <div class="navbar__logo">
    <a href="index.html" class="navbar__logo-text">Scentinel</a>
  </div>
  <div class="navbar__right">
    <a class="nav-icon cart-wrap" href="cart.html" aria-label="Cart">
      <svg viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
      <span class="cart-badge" id="cartBadge"></span>
    </a>
    <a class="nav-icon" href="login.html" aria-label="Account">
      <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    </a>
  </div>
</nav>

<div class="c-page">
  <h1 class="s-title">Order History</h1>
  <div id="orderContent"></div>
</div>

<footer class="c-footer">
  <span class="c-footer__auth">100% Authentic — Guaranteed</span>
  <span class="c-footer__copy">&copy; 2026 Scentinel. All Rights Reserved.</span>
</footer>

<script>
// Cart badge
const cartItems = JSON.parse(localStorage.getItem('scentinel_cart') || '[]');
const qty = cartItems.reduce((s, i) => s + i.qty, 0);
const badge = document.getElementById('cartBadge');
if (qty > 0) badge.textContent = qty;

// Navbar scroll
window.addEventListener('scroll', () => {
  const scrolled = window.scrollY > 40;
  document.getElementById('mainNav').classList.toggle('scrolled', scrolled);
  document.getElementById('announce').classList.toggle('hidden', scrolled);
}, { passive: true });

function fmt(n) { return '₱' + n.toLocaleString('en-PH', { minimumFractionDigits: 2 }); }

function renderOrders() {
  const orders = JSON.parse(localStorage.getItem('scentinel_orders') || '[]');
  const container = document.getElementById('orderContent');

  if (!orders.length) {
    container.innerHTML = `
      <div class="empty-state">
        <svg class="empty-state__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
          <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/>
        </svg>
        <p class="empty-state__title">No Orders Yet</p>
        <p class="empty-state__sub">Start shopping and your orders will appear here.</p>
        <a href="index.html" class="empty-state__cta">Browse Perfumes</a>
      </div>`;
    return;
  }

  let html = '<div class="order-list">';

  orders.forEach((order, oi) => {
    const items    = order.items || [];
    const first    = items[0];
    const extra    = items.slice(1);
    const orderDate = order.order_date ? new Date(order.order_date).toLocaleDateString('en-US', { month:'short', day:'2-digit', year:'numeric' }) : '';
    const st       = (order.status || 'Pending').toLowerCase();
    const badgeCls = st === 'completed' || st === 'delivered' ? 'status-badge--completed' : st === 'cancelled' ? 'status-badge--cancelled' : 'status-badge--pending';

    html += `<div class="order-row" id="order-${oi}">`;

    if (first) {
      html += `
        <div class="order-row__img">${first.brand ? first.brand.charAt(0) : '?'}</div>
        <div class="order-row__info">
          <p class="order-row__brand">${first.brand || '—'}</p>
          <p class="order-row__name">${first.name}</p>
          <p class="order-row__meta">Perfume${first.qty > 1 ? ' ×' + first.qty : ''}</p>
          ${extra.length ? `<button class="order-row__more" onclick="toggleExtra(${oi})">+${extra.length} more item${extra.length > 1 ? 's' : ''}</button>` : ''}
        </div>`;
    } else {
      html += `<div class="order-row__info"><p class="order-row__brand" style="opacity:.4">No items</p></div>`;
    }

    html += `
      <div class="order-row__right">
        <span class="status-badge ${badgeCls}">${order.status || 'Pending'}</span>
        <span class="order-row__price">${fmt(order.total_amount)}</span>
        ${orderDate ? `<span class="order-row__date">${orderDate}</span>` : ''}
        <span class="order-row__number">${order.order_number}</span>
      </div>
    </div>`;

    if (extra.length) {
      html += `<div class="order-row__sub" id="extra-${oi}">`;
      extra.forEach(item => {
        html += `
          <div class="sub-item">
            <div class="sub-item__img">${item.brand ? item.brand.charAt(0) : '?'}</div>
            <span class="sub-item__name">${item.name}</span>
            <span class="sub-item__qty">×${item.qty}</span>
            <span class="sub-item__price">${fmt(item.price * item.qty)}</span>
          </div>`;
      });
      html += '</div>';
    }
  });

  html += '</div>';
  container.innerHTML = html;
}

function toggleExtra(idx) {
  const sub = document.getElementById('extra-' + idx);
  const btn = document.querySelector('#order-' + idx + ' .order-row__more');
  if (!sub) return;
  const open = sub.classList.toggle('open');
  if (btn) btn.textContent = open ? 'Show less' : `+${sub.querySelectorAll('.sub-item').length} more item${sub.querySelectorAll('.sub-item').length > 1 ? 's' : ''}`;
}

renderOrders();
</script>
</body>
</html>
